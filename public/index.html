<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>청년 안심 H+T 추천 시스템</title>
    <style>
      :root {
        color: #171717;
        background: #f7f7f2;
        font-family:
          Inter, Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(720px, calc(100vw - 40px));
        border: 1px solid #d9d8cf;
        background: #ffffff;
        padding: 32px;
        box-shadow: 0 24px 60px rgb(0 0 0 / 8%);
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(28px, 5vw, 44px);
        line-height: 1.1;
      }

      p {
        margin: 0 0 14px;
        color: #454545;
        line-height: 1.7;
      }

      a {
        color: #0f6f5c;
        font-weight: 700;
      }

      dl {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 10px 16px;
        margin: 24px 0 0;
      }

      dt {
        color: #6b6b6b;
      }

      dd {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>청년 안심 H+T 추천 시스템</h1>
      <p>
        이 저장소는 FastAPI 백엔드, 데이터 파이프라인, 모바일 앱 코드를 관리합니다.
        운영 백엔드는 EC2에서 실행되고, 웹 프론트엔드는 별도 Vercel SPA로
        배포됩니다.
      </p>
      <dl>
        <dt>웹 서비스</dt>
        <dd><a href="https://youth-ht-web.vercel.app">youth-ht-web.vercel.app</a></dd>
        <dt>API 서버</dt>
        <dd>http://3.26.146.162:8000</dd>
        <dt>GitHub</dt>
        <dd><a href="https://github.com/LeeJaeHaeng/youth-ht">LeeJaeHaeng/youth-ht</a></dd>
      </dl>
    </main>
  </body>
</html>
